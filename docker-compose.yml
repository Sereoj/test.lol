version: '3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app
    container_name: laravel-app
    restart: unless-stopped
    volumes:
      - ./:/var/www
      - /var/www/vendor
      - laravel-storage:/var/www/storage
      - laravel-cache:/var/www/bootstrap/cache
    networks:
      - app-network
    environment:
      - "PHP_MEMORY_LIMIT=512M"

  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - /var/www/vendor
      - laravel-storage:/var/www/storage
      - laravel-cache:/var/www/bootstrap/cache
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

networks:
  app-network:
    driver: bridge

volumes:
  laravel-storage:
    driver: local
  laravel-cache:
    driver: local 