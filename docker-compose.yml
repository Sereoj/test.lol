version: '3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app
    container_name: laravel-app
    restart: unless-stopped
    volumes:
      - ./:/var/www
      - /var/www/vendor
      - laravel-storage:/var/www/storage
      - laravel-cache:/var/www/bootstrap/cache
    networks:
      - app-network
    environment:
      - "PHP_MEMORY_LIMIT=512M"

  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - /var/www/vendor
      - laravel-storage:/var/www/storage
      - laravel-cache:/var/www/bootstrap/cache
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/letsencrypt:/etc/nginx/ssl
      - ./certbot/www:/var/www/certbot
    networks:
      - app-network
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot --email admin@wallone.ru -d wallone.ru --agree-tos --non-interactive
    depends_on:
      - nginx

  certbot-renew:
    image: certbot/certbot
    volumes:
      - ./certbot/letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx

networks:
  app-network:
    driver: bridge

volumes:
  laravel-storage:
    driver: local
  laravel-cache:
    driver: local 