name: Deploy to Production

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, json, libxml, zip
          coverage: none

      # Install dependencies
      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-progress --no-interaction

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      # Install Node.js dependencies
      - name: Install Node.js dependencies
        run: npm ci

      # Build assets
      - name: Build assets
        run: npm run build

      # Generate .env file
      - name: Generate .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      # Generate application key
      - name: Generate application key
        run: php artisan key:generate --force
      
      # Run storage link
      - name: Run storage link
        run: php artisan storage:link

      # Clear cache
      - name: Clear cache
        run: |
          php artisan cache:clear
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

      # Deploy to server
      - name: Deploy to server
        id: deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all
            git checkout $(git branch --show-current)
            git pull origin $(git branch --show-current)
            composer install --no-dev --prefer-dist --no-interaction
            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link
            # Перезапуск необходимых сервисов
            # sudo systemctl restart php-fpm
            # sudo systemctl restart nginx
            echo "DEPLOY_STATUS=success" >> $GITHUB_OUTPUT
      
      # Проверка статуса деплоя
      - name: Verify deployment
        if: steps.deploy.outputs.DEPLOY_STATUS == 'success'
        run: echo "✅ Деплой успешно выполнен на сервер ${{ secrets.SSH_HOST }}" 