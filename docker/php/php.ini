[PHP]
; PHP Production Configuration

; Ошибки - только логировать, не показывать
display_errors = Off
display_startup_errors = Off
log_errors = On
; Используем стандартный вывод PHP-FPM (stderr) для логов
; Docker автоматически перехватит эти логи
error_log = /proc/self/fd/2

; Логировать только критичные ошибки и выше
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT & ~E_NOTICE & ~E_WARNING

; Лимиты
memory_limit = ${PHP_MEMORY_LIMIT}
max_execution_time = 60
max_input_time = 60
upload_max_filesize = ${PHP_MAX_UPLOAD}
post_max_size = ${PHP_MAX_UPLOAD}
max_file_uploads = ${PHP_MAX_FILE_UPLOAD}

; Безопасность
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; Session
session.save_handler = files
session.save_path = /var/www/storage/framework/sessions
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

; Timezone
date.timezone = Europe/Moscow

; Realpath cache для production
realpath_cache_size = 4096K
realpath_cache_ttl = 600
