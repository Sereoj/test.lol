[www]
user = www-data
group = www-data
listen = 9000
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500

; Отключаем error_log для PHP-FPM (используем только логи PHP из php.ini)
php_admin_flag[log_errors] = off
catch_workers_output = no

; Очищаем конфигурацию access log
access.log = /dev/null

; Security
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source
