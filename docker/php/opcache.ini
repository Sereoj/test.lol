[opcache]
; OPcache для максимальной производительности в production

opcache.enable = 1
opcache.enable_cli = 0

; Память
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000

; Валидация - отключена в production для максимальной производительности
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0

; Оптимизация
opcache.save_comments = 1
opcache.fast_shutdown = 1
opcache.enable_file_override = 1

; JIT compilation для PHP 8.2
opcache.jit_buffer_size = 100M
opcache.jit = tracing

; Логирование ошибок OPcache
opcache.error_log = /var/www/storage/logs/opcache-error.log
opcache.log_verbosity_level = 2
